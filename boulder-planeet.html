<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Boulder-Planeet — Klimmen in Nederland</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#04060d; --sur:rgba(10,14,24,0.95); --brd:#1a2438;
    --txt:#dde4f0; --dim:#5a6e98; --acc:#4a9eff; --gld:#f0c060;
    --binnen:#4a9eff; --buiten:#2ed67a; --comp:#ff4a5e; --jeugd:#f0c060; --toprope:#b06bff;
    --winkel:#ff8c42; --cursus:#42d4a8; --school:#e86bff; --instituut:#ffd25e;
    --land:#0d2040; --zee:#060e1c; --kust:#3a8eff; --rivier:#1a4a88;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);
    height:100dvh;overflow:hidden;display:flex;flex-direction:column;touch-action:none}

  header{display:flex;align-items:center;justify-content:space-between;
    padding:9px 14px;background:var(--sur);border-bottom:1px solid var(--brd);
    z-index:20;gap:8px;flex-shrink:0;backdrop-filter:blur(12px)}
  .htitle{font-family:'DM Serif Display',serif;font-size:.9rem;white-space:nowrap;line-height:1.2}
  .htitle em{color:var(--acc);font-style:italic}
  .hsub{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--dim);margin-top:1px}
  .ztag{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--dim);
    background:rgba(26,36,56,.7);border:1px solid var(--brd);border-radius:14px;
    padding:4px 10px;white-space:nowrap;flex-shrink:0}
  .ztag b{color:var(--gld)}
  .hbtns{display:flex;gap:5px;flex-shrink:0}
  .hb{padding:5px 9px;border:1px solid var(--brd);background:rgba(10,14,24,.8);
    color:var(--dim);border-radius:5px;font-family:'DM Mono',monospace;font-size:.65rem;
    cursor:pointer;transition:all .15s;touch-action:manipulation}
  .hb:hover,.hb.on{border-color:var(--acc);color:var(--acc)}

  #wrap{flex:1;position:relative;overflow:hidden}
  canvas{display:block;width:100%!important;height:100%!important;touch-action:none}

  /* ZOOM TRAPPEN */
  .ztraps{position:absolute;right:11px;top:50%;transform:translateY(-50%);
    display:flex;flex-direction:column;gap:4px;z-index:10}
  .ztb{width:46px;height:46px;border-radius:9px;border:1px solid var(--brd);
    background:rgba(8,12,22,.9);color:var(--dim);font-family:'DM Mono',monospace;
    cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:1px;transition:all .15s;backdrop-filter:blur(8px);touch-action:manipulation}
  .ztb .zi{font-size:1rem;line-height:1}
  .ztb .zk{font-size:.5rem;opacity:.55;letter-spacing:.02em}
  .ztb.on{border-color:var(--gld);color:var(--gld);background:rgba(240,192,96,.1)}

  /* FILTER */
  .fbar{position:absolute;left:9px;top:50%;transform:translateY(-50%);
    display:flex;flex-direction:column;gap:4px;z-index:10}
  .fb{display:flex;align-items:center;gap:5px;padding:5px 9px;
    border:1px solid var(--brd);background:rgba(8,12,22,.88);
    border-radius:5px;font-family:'DM Mono',monospace;font-size:.6rem;
    cursor:pointer;transition:all .15s;backdrop-filter:blur(8px);
    white-space:nowrap;touch-action:manipulation;user-select:none}
  .fb-d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .fb.off{opacity:.22}

  /* INFO KAARTJE */
  #kaart{position:absolute;bottom:0;left:0;right:0;
    background:rgba(6,9,18,.98);border-top:1px solid var(--brd);
    padding:12px 16px 20px;z-index:30;
    transform:translateY(102%);transition:transform .26s cubic-bezier(.28,0,.18,1);
    max-height:52dvh;overflow-y:auto;backdrop-filter:blur(20px)}
  #kaart.open{transform:translateY(0)}
  .ktrek{width:32px;height:3px;background:var(--brd);border-radius:2px;margin:0 auto 10px}
  .kband{height:3px;border-radius:1px;margin-bottom:9px}
  .ktop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
  .knaam{font-family:'DM Serif Display',serif;font-size:1rem;line-height:1.3;flex:1}
  .ksluit{width:26px;height:26px;border-radius:50%;border:1px solid var(--brd);
    background:transparent;color:var(--dim);font-size:.75rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation}
  .kcat{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;
    text-transform:uppercase;margin-bottom:3px;opacity:.7}
  .kstad{font-size:.72rem;color:var(--dim);margin-bottom:8px;font-family:'DM Mono',monospace}
  .kbeschr{font-size:.78rem;line-height:1.65;color:#9aadcc;
    border-left:2px solid var(--brd);padding-left:9px;margin-bottom:10px}
  .ktags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
  .ktag{padding:2px 7px;border-radius:3px;font-size:.58rem;
    font-family:'DM Mono',monospace;border:1px solid currentColor;opacity:.75}
  .kvb{background:rgba(255,255,255,.03);border:1px solid var(--brd);
    border-radius:7px;padding:8px 11px;margin-bottom:5px}
  .kvb-met{font-size:.7rem;color:var(--txt);font-weight:600;margin-bottom:2px}
  .kvb-w{font-size:.68rem;color:var(--gld);line-height:1.5}
  .kurl{margin-bottom:10px}
  .kurl a{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--acc);
    text-decoration:none;word-break:break-all}
  .kurl a:hover{text-decoration:underline}

  #btip{position:absolute;background:rgba(6,9,18,.97);border:1px solid var(--gld);
    border-radius:7px;padding:8px 12px;font-size:.7rem;max-width:220px;
    z-index:25;pointer-events:none;opacity:0;transition:opacity .15s;
    color:var(--txt);line-height:1.5;word-break:break-word}
  #btip.on{opacity:1}
  #btip strong{color:var(--gld)}

  #hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
    font-family:'DM Mono',monospace;font-size:.6rem;color:var(--dim);
    background:rgba(10,14,24,.88);padding:5px 13px;border-radius:14px;
    border:1px solid var(--brd);pointer-events:none;white-space:nowrap;
    z-index:10;transition:opacity .3s}
  #hint.hide{opacity:0}

  /* Laadscherm */
  #loader{position:absolute;inset:0;background:var(--bg);display:flex;
    flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:50}
  .lds{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--dim)}
  .ldbar{width:160px;height:2px;background:var(--brd);border-radius:1px;overflow:hidden}
  .ldfil{height:100%;background:var(--acc);border-radius:1px;
    animation:ldani 1.4s ease-in-out infinite}
  @keyframes ldani{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}

  /* ── EIGEN PINS PANEL ───────────────────────────────────── */
  #epPanel{position:absolute;top:0;right:0;bottom:0;width:min(320px,90vw);
    background:rgba(6,9,18,.98);border-left:1px solid var(--brd);
    z-index:40;display:flex;flex-direction:column;
    transform:translateX(102%);transition:transform .28s cubic-bezier(.28,0,.18,1);
    backdrop-filter:blur(20px)}
  #epPanel.open{transform:translateX(0)}
  .ep-hdr{display:flex;align-items:center;justify-content:space-between;
    padding:11px 14px;border-bottom:1px solid var(--brd);flex-shrink:0}
  .ep-titel{font-family:'DM Serif Display',serif;font-size:.88rem}
  .ep-sluit{width:26px;height:26px;border-radius:50%;border:1px solid var(--brd);
    background:transparent;color:var(--dim);font-size:.7rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;touch-action:manipulation}
  .ep-form{padding:12px 14px;border-bottom:1px solid var(--brd);flex-shrink:0;display:flex;flex-direction:column;gap:7px}
  .ep-inp{background:rgba(10,14,24,.9);border:1px solid var(--brd);border-radius:5px;
    color:var(--txt);font-family:'DM Mono',monospace;font-size:.68rem;
    padding:6px 9px;width:100%;outline:none;transition:border-color .15s}
  .ep-inp:focus{border-color:var(--acc)}
  .ep-inp::placeholder{color:var(--dim);opacity:.6}
  .ep-row{display:flex;gap:6px}
  .ep-sel{background:rgba(10,14,24,.9);border:1px solid var(--brd);border-radius:5px;
    color:var(--txt);font-family:'DM Mono',monospace;font-size:.68rem;
    padding:6px 9px;flex:1;outline:none;cursor:pointer}
  .ep-geo-btn{padding:6px 11px;border:1px solid var(--acc);background:rgba(74,158,255,.12);
    color:var(--acc);border-radius:5px;font-family:'DM Mono',monospace;font-size:.65rem;
    cursor:pointer;white-space:nowrap;touch-action:manipulation;transition:all .15s}
  .ep-geo-btn:hover{background:rgba(74,158,255,.22)}
  .ep-geo-status{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--dim);min-height:14px}
  .ep-add-btn{padding:7px;border:1px solid var(--som);background:rgba(46,214,122,.12);
    color:var(--som);border-radius:5px;font-family:'DM Mono',monospace;font-size:.68rem;
    cursor:pointer;touch-action:manipulation;transition:all .15s;text-align:center}
  .ep-add-btn:hover{background:rgba(46,214,122,.22)}
  .ep-lijst{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px}
  .ep-item{background:rgba(10,14,24,.7);border:1px solid var(--brd);border-radius:6px;
    padding:8px 10px;display:flex;align-items:flex-start;gap:8px}
  .ep-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
  .ep-item-info{flex:1;min-width:0}
  .ep-item-naam{font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ep-item-meta{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--dim);margin-top:1px}
  .ep-item-acties{display:flex;gap:4px;flex-shrink:0}
  .ep-edit-btn,.ep-del-btn{width:22px;height:22px;border-radius:4px;border:1px solid var(--brd);
    background:transparent;color:var(--dim);font-size:.6rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;touch-action:manipulation;transition:all .15s}
  .ep-edit-btn:hover{border-color:var(--acc);color:var(--acc)}
  .ep-del-btn:hover{border-color:var(--sein);color:var(--sein)}
  .ep-leeg{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--dim);
    text-align:center;padding:20px 0;opacity:.5}

  /* VBN-panel (relaties) */
  #vbPanel{position:absolute;top:0;right:0;bottom:0;width:min(320px,90vw);
    background:rgba(6,9,18,.98);border-left:1px solid var(--brd);
    z-index:41;display:flex;flex-direction:column;
    transform:translateX(102%);transition:transform .28s cubic-bezier(.28,0,.18,1);
    backdrop-filter:blur(20px)}
  #vbPanel.open{transform:translateX(0)}
  .vb-hdr{display:flex;align-items:center;justify-content:space-between;
    padding:11px 14px;border-bottom:1px solid var(--brd);flex-shrink:0}
  .vb-titel{font-family:'DM Serif Display',serif;font-size:.88rem}
  .vb-sluit{width:26px;height:26px;border-radius:50%;border:1px solid var(--brd);
    background:transparent;color:var(--dim);font-size:.7rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;touch-action:manipulation}
  .vb-form{padding:12px 14px;border-bottom:1px solid var(--brd);flex-shrink:0;display:flex;flex-direction:column;gap:7px}
  .vb-sel{background:rgba(10,14,24,.9);border:1px solid var(--brd);border-radius:5px;
    color:var(--txt);font-family:'DM Mono',monospace;font-size:.68rem;
    padding:6px 9px;width:100%;outline:none;cursor:pointer}
  .vb-add-btn{padding:7px;border:1px solid var(--gld);background:rgba(240,192,96,.1);
    color:var(--gld);border-radius:5px;font-family:'DM Mono',monospace;font-size:.68rem;
    cursor:pointer;touch-action:manipulation;transition:all .15s;text-align:center}
  .vb-add-btn:hover{background:rgba(240,192,96,.2)}
  .vb-lijst{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px}
  .vb-item{background:rgba(10,14,24,.7);border:1px solid #f0c06030;border-radius:6px;
    padding:8px 10px;display:flex;align-items:flex-start;gap:8px}
  .vb-item-info{flex:1;min-width:0}
  .vb-item-lbl{font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;line-height:1.4}
  .vb-item-meta{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--dim);margin-top:2px}
  .vb-item-acties{display:flex;gap:4px;flex-shrink:0}
  .vb-del-btn{width:22px;height:22px;border-radius:4px;border:1px solid var(--brd);
    background:transparent;color:var(--dim);font-size:.6rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;touch-action:manipulation;transition:all .15s}
  .vb-del-btn:hover{border-color:var(--sein);color:var(--sein)}
  .vb-leeg{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--dim);
    text-align:center;padding:20px 0;opacity:.5}

  /* EDIT-via-kaartje overlay (in kaart) */
  #editOverlay{display:none;position:absolute;inset:0;background:rgba(6,9,18,.97);
    z-index:35;padding:14px 16px;flex-direction:column;gap:8px;overflow-y:auto}
  #editOverlay.open{display:flex}
  .eo-titel{font-family:'DM Serif Display',serif;font-size:.9rem;margin-bottom:2px}
  .eo-inp{background:rgba(10,14,24,.9);border:1px solid var(--brd);border-radius:5px;
    color:var(--txt);font-family:'DM Mono',monospace;font-size:.68rem;
    padding:6px 9px;width:100%;outline:none;transition:border-color .15s}
  .eo-inp:focus{border-color:var(--acc)}
  .eo-btns{display:flex;gap:6px;margin-top:4px}
  .eo-save{flex:1;padding:8px;border:1px solid var(--som);background:rgba(46,214,122,.12);
    color:var(--som);border-radius:5px;font-family:'DM Mono',monospace;font-size:.7rem;
    cursor:pointer;touch-action:manipulation}
  .eo-cancel{flex:1;padding:8px;border:1px solid var(--brd);background:transparent;
    color:var(--dim);border-radius:5px;font-family:'DM Mono',monospace;font-size:.7rem;
    cursor:pointer;touch-action:manipulation}

  /* TOAST */
  #toast{position:absolute;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);
    background:rgba(10,16,30,.97);border:1px solid var(--acc);border-radius:8px;
    padding:8px 16px;font-family:'DM Mono',monospace;font-size:.68rem;color:var(--txt);
    z-index:60;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;
    white-space:nowrap;max-width:90vw;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.ok{border-color:var(--som)}
  #toast.err{border-color:var(--sein)}
</style>
</head>
<body>
<header>
  <div>
    <div class="htitle">🧗 <em>Boulder-Planeet</em></div>
    <div class="hsub">Klimmen &amp; Boulderen Ecosysteem Nederland · ∅ ~400km · omtrek ~4000km</div>
  </div>
  <div class="ztag">Zoom: <b id="zlbl">Landelijk</b> <span id="zkm" style="opacity:.45">· 100km</span></div>
  <div class="hbtns">
    <button class="hb" id="burl" onclick="togURL()" title="URL-toggle: toon/verberg website-links">🔗</button>
    <button class="hb" id="beigen" onclick="togEigen()" title="Eigen data: AAN/UIT">📦</button>
    <button class="hb" id="bep" onclick="openEP()" title="Eigen pins">📌</button>
    <button class="hb" id="bvb" onclick="openVB()" title="Eigen relaties">↔</button>
    <button class="hb" onclick="exporteerPins()" title="Exporteer eigen pins + relaties naar JSON">⬇</button>
    <button class="hb" onclick="document.getElementById('importInput').click()" title="Importeer eigen pins + relaties uit JSON">⬆</button>
    <input type="file" id="importInput" accept=".json" style="display:none" onchange="importeerPins(event)">
    <button class="hb on" id="brot" onclick="togRot()">⟳</button>
    <button class="hb" onclick="resetV()">⌂</button>
  </div>
</header>

<div id="wrap">
  <canvas id="c"></canvas>

  <div id="loader">
    <div class="lds">Klimlocaties laden…</div>
    <div class="ldbar"><div class="ldfil"></div></div>
  </div>

  <div class="fbar">
    <div class="fb on" data-cat="binnen" style="color:var(--binnen);border-color:var(--binnen)" onclick="togF('binnen')">
      <span class="fb-d" style="background:var(--binnen)"></span>Binnen
    </div>
    <div class="fb on" data-cat="buiten" style="color:var(--buiten);border-color:var(--buiten)" onclick="togF('buiten')">
      <span class="fb-d" style="background:var(--buiten)"></span>Buiten
    </div>
    <div class="fb on" data-cat="competitie" style="color:var(--comp);border-color:var(--comp)" onclick="togF('competitie')">
      <span class="fb-d" style="background:var(--comp)"></span>Competitie
    </div>
    <div class="fb on" data-cat="jeugd" style="color:var(--jeugd);border-color:var(--jeugd)" onclick="togF('jeugd')">
      <span class="fb-d" style="background:var(--jeugd)"></span>Jeugd
    </div>
    <div class="fb on" data-cat="toprope" style="color:var(--toprope);border-color:var(--toprope)" onclick="togF('toprope')">
      <span class="fb-d" style="background:var(--toprope)"></span>Toprope
    </div>
    <div class="fb on" data-cat="winkel" style="color:var(--winkel);border-color:var(--winkel)" onclick="togF('winkel')">
      <span class="fb-d" style="background:var(--winkel)"></span>Winkel
    </div>
    <div class="fb on" data-cat="cursus" style="color:var(--cursus);border-color:var(--cursus)" onclick="togF('cursus')">
      <span class="fb-d" style="background:var(--cursus)"></span>Cursus
    </div>
    <div class="fb on" data-cat="school" style="color:var(--school);border-color:var(--school)" onclick="togF('school')">
      <span class="fb-d" style="background:var(--school)"></span>School
    </div>
    <div class="fb on" data-cat="instituut" style="color:var(--instituut);border-color:var(--instituut)" onclick="togF('instituut')">
      <span class="fb-d" style="background:var(--instituut)"></span>Instituut
    </div>
    <div class="fb on" data-cat="eigen" style="color:#aaffcc;border-color:#aaffcc" onclick="togF('eigen')">
      <span class="fb-d" style="background:#aaffcc"></span>Eigen
    </div>
  </div>

  <div class="ztraps">
    <button class="ztb on" id="zt1" onclick="setTrap(1)"><span class="zi">🌍</span><span class="zk">100km</span></button>
    <button class="ztb" id="zt2" onclick="setTrap(2)"><span class="zi">🔍</span><span class="zk">10km</span></button>
    <button class="ztb" id="zt3" onclick="setTrap(3)"><span class="zi">📍</span><span class="zk">1km</span></button>
  </div>

  <div id="kaart">
    <div class="ktrek"></div>
    <div class="kband" id="kband"></div>
    <div class="kcat" id="kcat"></div>
    <div class="ktop"><div class="knaam" id="knaam"></div>
      <div style="display:flex;gap:5px;align-items:center">
        <button class="ksluit" id="kEditBtn" onclick="openEditViaKaart()" style="display:none;font-size:.6rem" title="Bewerken">✏️</button>
        <button class="ksluit" id="kDelBtn" onclick="verwijderViaKaart()" style="display:none;font-size:.6rem;color:var(--sein)" title="Verwijderen">🗑</button>
        <button class="ksluit" onclick="sluit()">✕</button>
      </div>
    </div>
    <div class="kstad" id="kstad"></div>
    <div class="kurl" id="kurl" style="display:none"></div>
    <div class="kbeschr" id="kbeschr"></div>
    <div class="ktags" id="ktags"></div>
    <div id="kvbs"></div>
  </div>

  <div id="btip"></div>
  <div id="hint">Draaien · Tik klimhal · Pinch/scroll = zoom</div>

  <!-- EIGEN PINS PANEL -->
  <div id="epPanel">
    <div class="ep-hdr">
      <div class="ep-titel">📌 Eigen pins</div>
      <button class="ep-sluit" onclick="sluitEP()">✕</button>
    </div>
    <div class="ep-form">
      <input class="ep-inp" id="epNaam" placeholder="Naam locatie" />
      <div class="ep-row">
        <select class="ep-sel" id="epCat">
          <option value="eigen">Eigen</option>
          <option value="binnen">Boulderhal</option>
          <option value="buiten">Buitenklimmen</option>
          <option value="competitie">Competitie</option>
          <option value="jeugd">Jeugd</option>
          <option value="toprope">Toprope / Voorklim</option>
          <option value="winkel">Winkel</option>
          <option value="cursus">Cursus / Workshop</option>
          <option value="school">School</option>
          <option value="instituut">Instituut</option>

// BOULDER-PLANEET
// Straal R zo gekozen dat omtrek = 2πR ≈ 4000 km
// R = 4000/(2π) ≈ 636 km  →  genormaliseerd: R = 1.0 (eenheid)
// 1 Three.js eenheid = 636 km
//
// Projectie: WGS84 lat/lon → sferisch, gecentreerd op NL centroid
// NL centroid ≈ 52.20°N, 5.28°O
// NL breedte N-Z ≈ 2.8° lat ≈ 312 km  → 28° booglengte op planeet
// NL breedte W-O ≈ 3.8° lon ≈ 260 km  → 23° booglengte op planeet
// Schaalfactor: we stretchen NL zodanig dat het ~140° booglengte beslaat
// (dus "continentaal groot" op onze mini-planeet)
// ================================================================

const R = 1.0;

// NL centroid en schaalfactor
// We mappen NL lat-range [50.75, 53.55] → [-70°, +70°] op de bol (polair)
// en NL lon-range [3.36, 7.09]   → [-70°, +70°] op de bol (equatoriaal)
const LAT_MIN = 50.75, LAT_MAX = 53.55;
const LON_MIN = 3.36,  LON_MAX = 7.09;
const LAT_CEN = (LAT_MIN + LAT_MAX) / 2; // 52.15
const LON_CEN = (LON_MIN + LON_MAX) / 2; // 5.225

// Hoek die het volledige NL-bereik beslaat op de bol (graden)
const BOL_SPAN = 130; // zodat NL het grootste deel van de voorkant vult

function latLon2Bol(lat, lon) {
  // Normaliseer binnen NL bereik → [-1, +1]
  const nx = (lon - LON_CEN) / ((LON_MAX - LON_MIN) / 2);
  const ny = (lat - LAT_CEN) / ((LAT_MAX - LAT_MIN) / 2);
  // Naar hoeken op de bol (in graden)
  const thetaX = nx * (BOL_SPAN / 2); // horizontaal (oost-west)
  const thetaY = ny * (BOL_SPAN / 2); // verticaal (noord-zuid)
  // Sferische coördinaten: begin aan de voorkant (z+), roteer dan
  // pitch (thetaY om X-as) en yaw (thetaX om Y-as)
  const pyRad = thetaY * Math.PI / 180;
  const pxRad = thetaX * Math.PI / 180;
  const x = R * Math.sin(pxRad) * Math.cos(pyRad);
  const y = R * Math.sin(pyRad);
  const z = R * Math.cos(pxRad) * Math.cos(pyRad);
  return new THREE.Vector3(x, y, z);
}

  return new THREE.Line(geo, new THREE.LineBasicMaterial({color:kleur, transparent:true, opacity:opac}));

// ── EXPORT / IMPORT ───────────────────────────────────────────
function exporteerPins(){
  if(!eigenPins.length&&!eigenVBN.length){toon('Geen eigen data om te exporteren','err');return;}
  const data={boulder_eigenPins:eigenPins,boulder_eigenVBN:eigenVBN,exportDatum:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='boulder-eigen-pins.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toon(`${eigenPins.length} pin(s) + ${eigenVBN.length} relatie(s) geexporteerd`,'ok');
}

function importeerPins(evt){
  const file=evt.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      const pins=data.boulder_eigenPins;
      const vbn=data.boulder_eigenVBN;
      if(!Array.isArray(pins)||!Array.isArray(vbn)) throw new Error('Ongeldig formaat');
      const bestaandeIds=new Set(eigenPins.map(p=>p.id));
      const nieuw=pins.filter(p=>!bestaandeIds.has(p.id));
      eigenPins=[...eigenPins,...nieuw];
      const bestaandeVBN=new Set(eigenVBN.map(v=>v.van+'|'+v.naar+'|'+v.label));
      const nieuweVBN=vbn.filter(v=>!bestaandeVBN.has(v.van+'|'+v.naar+'|'+v.label));
      eigenVBN=[...eigenVBN,...nieuweVBN];
      slaEigenPinsOp();slaEigenVBNOp();
      renderEpLijst();renderVbLijst();vernieuwAlles();
      toon(`${nieuw.length} pin(s) + ${nieuweVBN.length} relatie(s) geimporteerd`,'ok');
    }catch(err){
      toon('Fout bij importeren: ongeldig bestand','err');
    }
    evt.target.value='';
  };
  reader.readAsText(file);
}

// ── GEOCODER (Nominatim) ──────────────────────────────────────
let geocodedLat=null, geocodedLon=null;
async function geocodeer(){
  const q=document.getElementById('epAdres').value.trim();
  if(!q){toon('Vul een adres in','err');return;}
  const st=document.getElementById('epGeoStatus');
  st.textContent='Zoeken…';
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=nl&limit=1`,
      {headers:{'Accept-Language':'nl'}});
    const d=await r.json();
    if(!d.length){st.textContent='Niet gevonden. Probeer anders.';return;}
    geocodedLat=parseFloat(d[0].lat);
    geocodedLon=parseFloat(d[0].lon);
    const naam=d[0].display_name.split(',')[0];
    st.textContent=`✓ ${naam} (${geocodedLat.toFixed(3)}, ${geocodedLon.toFixed(3)})`;
    if(!document.getElementById('epNaam').value) document.getElementById('epNaam').value=naam;
  }catch(e){st.textContent='Fout bij ophalen. Probeer opnieuw.';}
}

function voegEigenPinToe(){
  const naam=document.getElementById('epNaam').value.trim();
  if(!naam){toon('Vul een naam in','err');return;}
  if(geocodedLat===null){toon('Zoek eerst op adres (🔍)','err');return;}
  const cat=document.getElementById('epCat').value;
  const beschr=document.getElementById('epBeschr').value.trim();
  const adres=document.getElementById('epAdres').value.trim();
  const pin={
    id:'eigen_'+Date.now(),
    naam,cat,lat:geocodedLat,lon:geocodedLon,
    stad:adres||naam,beschr:beschr||'Eigen pin',tags:['eigen'],
    isEigen:true
  };
  eigenPins.push(pin);
  slaEigenPinsOp();
  document.getElementById('epNaam').value='';
  document.getElementById('epAdres').value='';
  document.getElementById('epBeschr').value='';
  document.getElementById('epGeoStatus').textContent='';
  geocodedLat=null;geocodedLon=null;
  renderEpLijst();
  vernieuwAlles();
  toon(`📌 "${naam}" toegevoegd`,'ok');
}

function verwijderEP(i){
  const naam=eigenPins[i].naam;
  // Verwijder ook gekoppelde relaties
  eigenVBN=eigenVBN.filter(v=>v.van!==eigenPins[i].id&&v.naar!==eigenPins[i].id);
  eigenPins.splice(i,1);
  slaEigenPinsOp();slaEigenVBNOp();
  renderEpLijst();renderVbLijst();
  vernieuwAlles();
  toon(`🗑 "${naam}" verwijderd`,'ok');

function startEditEP(i){

  document.getElementById('epAdres').value=p.stad||'';
  document.getElementById('epBeschr').value=p.beschr||'';
  document.getElementById('epCat').value=p.cat||'eigen';
  geocodedLat=p.lat;geocodedLon=p.lon;
  document.getElementById('epGeoStatus').textContent=`✓ ${p.stad} (${p.lat.toFixed(3)}, ${p.lon.toFixed(3)})`;
  // Wijzig knop tijdelijk naar "Bijwerken"
  const btn=document.querySelector('.ep-add-btn');

function slaEPEditOp(){
  const naam=document.getElementById('epNaam').value.trim();
  if(!naam||editIdx===null){return;}
  eigenPins[editIdx]={...eigenPins[editIdx],
    naam,cat:document.getElementById('epCat').value,
    stad:document.getElementById('epAdres').value.trim()||naam,
    beschr:document.getElementById('epBeschr').value.trim(),
    lat:geocodedLat,lon:geocodedLon};
  slaEigenPinsOp();editIdx=null;
  document.querySelector('.ep-add-btn').textContent='+ Toevoegen';
  document.querySelector('.ep-add-btn').onclick=()=>voegEigenPinToe();
  document.getElementById('epNaam').value='';

  geocodedLat=null;geocodedLon=null;

}

// ── VERNIEUW ALLES (pins + bogen opbouwen) ────────────────────
function vernieuwAlles(){
  // Verwijder alle huidige eigen pins en bogen
  for(let i=pins.length-1;i>=0;i--){
    if(pins[i].userData.loc&&pins[i].userData.loc.isEigen){
      pinGrp.remove(pins[i]);pins.splice(i,1);
    }
  }
  // Eigen ringen ook opruimen
  for(let i=pinGrp.children.length-1;i>=0;i--){
    const c=pinGrp.children[i];
    if(c.userData.isRing&&c.userData.eigenPin) pinGrp.remove(c);
  }
  // Eigen bogen verwijderen
  for(let i=boogGrp.children.length-1;i>=0;i--){
    const c=boogGrp.children[i];
    if(c.userData.isEigen) boogGrp.remove(c);
  }
  for(let i=ankers.length-1;i>=0;i--){
    if(ankers[i].userData.isEigen){boogGrp.remove(ankers[i]);ankers.splice(i,1);}
  }

  if(!eigenMode) return; // Eigen data uit: geen eigen pins

  // Eigen pins toevoegen
  eigenPins.forEach(loc=>{
    const kl=KL[loc.cat]||KL.eigen;
    const p=latLon2Bol(loc.lat,loc.lon).multiplyScalar((R+0.025)/R);
    const kern=new THREE.Mesh(
      new THREE.SphereGeometry(0.007,14,14),
      new THREE.MeshPhongMaterial({color:kl,emissive:kl,emissiveIntensity:0.45,transparent:true,opacity:0.40})
    );
    kern.position.copy(p);
    kern.userData={loc,kl,baseEI:0.45,baseOpacity:0.40};
    pinGrp.add(kern);pins.push(kern);
    const ring=new THREE.Mesh(
      new THREE.RingGeometry(0.008,0.012,18),
      new THREE.MeshBasicMaterial({color:kl,transparent:true,opacity:0.15,side:THREE.DoubleSide})
    );
    ring.position.copy(p);ring.lookAt(p.clone().multiplyScalar(2));
    ring.userData={isRing:true,t:Math.random()*Math.PI*2,eigenPin:true};
    pinGrp.add(ring);
  });

  // Eigen VBN toevoegen (inclusief mix vast+eigen)
  const all=alleLocaties();
  eigenVBN.forEach(vb=>{
    const vL=all.find(l=>l.id===vb.van),nL=all.find(l=>l.id===vb.naar);
    if(!vL||!nL) return;
    const p1=latLon2Bol(vL.lat,vL.lon).multiplyScalar((R+0.022)/R);
    const p2=latLon2Bol(nL.lat,nL.lon).multiplyScalar((R+0.022)/R);
    const cp1=p1.clone().add(p2).multiplyScalar(0.5).normalize().multiplyScalar(R+0.055);
    const curve=new THREE.CubicBezierCurve3(p1,cp1,cp1.clone(),p2);
    const lijn=new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(curve.getPoints(80)),
      new THREE.LineBasicMaterial({color:0xaaffcc,transparent:true,opacity:0.28})
    );
    lijn.userData={isBoog:true,isEigen:true};boogGrp.add(lijn);
    const a=new THREE.Mesh(
      new THREE.SphereGeometry(0.007,8,8),
      new THREE.MeshBasicMaterial({color:0xaaffcc,transparent:true,opacity:0.18})
    );
    a.position.copy(curve.getPoint(0.30));
    a.userData={isBoogAnker:true,vb,vL,nL,isEigen:true};
    boogGrp.add(a);ankers.push(a);
  });

  // Filter eigen pins in actCats
  pins.forEach(m=>{if(m.userData.loc)m.visible=actCats.has(m.userData.loc.cat);});
  herteken();
}

  const p1=latLon2Bol(vL.lat,vL.lon).multiplyScalar((R+0.022)/R);
  const p2=latLon2Bol(nL.lat,nL.lon).multiplyScalar((R+0.022)/R);

  // Controlepunten dicht bij het oppervlak — boog vloeit langs de bol
  // ipv er ver boven uit te steken (was R+0.22, nu R+0.055)
  const cp1 = p1.clone().add(p2).multiplyScalar(0.5).normalize().multiplyScalar(R+0.055);
  const cp2 = cp1.clone(); // symmetrisch

  // Cubic Bézier: p1 → cp1 → cp2 → p2 (geeft vloeiendere lijn langs oppervlak)
  const curve = new THREE.CubicBezierCurve3(p1, cp1, cp2, p2);
  const curvePts = curve.getPoints(80);

  boogGrp.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(curvePts),
    new THREE.LineBasicMaterial({color:0xf0c060, transparent:true, opacity:0.28})
  ));
  boogGrp.children[boogGrp.children.length-1].userData={isBoog:true};

  // Ankerpunt op ~30% van de boog (dichter bij vertrekpunt, laag bij het oppervlak)
  // — zodat het label leesbaar is zonder de boog zelf te overstijgen
  const ankerPt = curve.getPoint(0.30);

  const a = new THREE.Mesh(
    new THREE.SphereGeometry(0.007, 8, 8),
    new THREE.MeshBasicMaterial({color:0xf0c060, transparent:true, opacity:0.18})
  );
  a.position.copy(ankerPt);
  a.userData={isBoogAnker:true,vb,vL,nL};
  boogGrp.add(a);
  ankers.push(a);
});

// ================================================================
// ZOOM
// ================================================================
const CZ={1:3.0,2:2.0,3:1.48};
const ZLB={1:'Landelijk',2:'Regionaal',3:'Lokaal'};
const ZKM={1:'100 km',2:'10 km',3:'1 km'};
// Pin-schaal continu gekoppeld aan camera-afstand — zelfde logica als labelSchaal()
// zodat dots en labels altijd proportioneel aan de stadstippen bewegen
function pinSchaal() {
  const t = Math.max(0, Math.min(1, (camera.position.z - 1.2) / (3.0 - 1.2)));
  // t=0 = dichtbij, t=1 = ver weg
  // Bewust klein gehouden zodat dots nooit de stadsnaam-schaal overstijgen
  // Schaal van 0.65 (ver) naar 1.05 (dichtbij) — bewust ingetogen
  return 0.65 + (1 - t) * 0.40;
}
// Label zichtbaarheid wordt continu berekend via labelSchaal()
let trap=1, doelZ=CZ[1];

function setTrap(n){
  trap=n; doelZ=CZ[n];
  [1,2,3].forEach(i=>document.getElementById('zt'+i).classList.toggle('on',i===n));
  document.getElementById('zlbl').textContent=ZLB[n];
  document.getElementById('zkm').textContent='· '+ZKM[n];
  herteken();
}
function updZI(z){
  const n=[1,2,3].reduce((a,b)=>Math.abs(CZ[b]-z)<Math.abs(CZ[a]-z)?b:a,1);
  if(n===trap) return; trap=n;
  [1,2,3].forEach(i=>document.getElementById('zt'+i).classList.toggle('on',i===n));
  document.getElementById('zlbl').textContent=ZLB[n];
  document.getElementById('zkm').textContent='· '+ZKM[n];
}

// ================================================================
// LABEL OVERLAY
// ================================================================
const lc=document.createElement('canvas');
lc.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:5';
wrap.appendChild(lc);
const lx=lc.getContext('2d');

// ================================================================
// LABEL SCHAAL — continu herberekend op basis van camera-afstand
// CZ[1]=3.0 (ver) → CZ[3]=1.48 (dichtbij)
// Afstand daalt → schaal stijgt → grotere letters, dikkere borders
// ================================================================
function labelSchaal() {
  // Normaliseer camera Z: 1.2 (max in) → 3.0 (ver uit) → waarde 0..1
  const cz = camera.position.z;
  const t = Math.max(0, Math.min(1, (cz - 1.2) / (3.0 - 1.2)));
  // t=0 → dichtbij (trap 3), t=1 → ver weg (trap 1)
  // Omgekeerd: schaalfactor 1 bij ver, groot bij dichtbij
  const s = 1 - t; // 0 = ver, 1 = dichtbij

  return {
    // Lettergrootte pin-label: 9px (ver) → 16px (dichtbij)
    // Bewust smaller plafond zodat labels niet groter worden dan de dot
    fs:        Math.round(9  + s * 7),
    // Lettergrootte stadstippen: 7px → 11px (referentie-schaal)
    fsStad:    Math.round(7  + s * 4),
    // Pill padding horizontaal
    px:        Math.round(4  + s * 5),
    // Lijndikte border
    lw:        0.5 + s * 1.2,
    // Verbindingslijn pin→label
    lijnLw:    0.4 + s * 0.9,
    // Offset label rechts van pin
    offset:    Math.round(13 + s * 10),
    // Hoeveel woorden tonen in naam (1 ver, alle woorden dichtbij)
    woorden:   s < 0.25 ? 2 : s < 0.6 ? 3 : 99,
    // Minimum zichtbaarheid: labels pas tonen als niet te ver
    zichtbaar: cz < 2.75,
    // Stadnamen pas bij regionaal/lokaal
    stadZichtbaar: cz < 2.35,
    // Zichtbaarheidsgradient: labels faden in bij inzoomen
    alpha:     Math.max(0, Math.min(1, (2.75 - cz) / 0.4)),
    alphaStad: Math.max(0, Math.min(1, (2.35 - cz) / 0.3)),
    // Border opacity
    borderAlpha: Math.round((0.35 + s * 0.45) * 255).toString(16).padStart(2,'0'),
  };
}

function herteken(){
  const w=wrap.clientWidth,h=wrap.clientHeight;
  const dpr=window.devicePixelRatio||1;
  lc.width=w*dpr; lc.height=h*dpr;
  lc.style.width=w+'px'; lc.style.height=h+'px';
  lx.setTransform(dpr,0,0,dpr,0,0); // gebruik setTransform ipv scale (reset vorige)
  lx.clearRect(0,0,w,h);

  const sc = labelSchaal();

  // ── STADNAMEN ──────────────────────────────────────────────
  if(sc.stadZichtbaar && sc.alphaStad > 0){
    lx.font=`${sc.fsStad}px DM Mono,monospace`;
    lx.fillStyle=`rgba(150,178,228,${(sc.alphaStad*0.6).toFixed(2)})`;
    stedenGrp.children.forEach(s=>{
      if(!s.userData.isStad) return;
      const wp=new THREE.Vector3(); s.getWorldPosition(wp);
      const cam=wp.clone().project(camera);
      if(cam.z>1.0) return;
      if(wp.clone().normalize().dot(camera.position.clone().sub(wp).normalize())<0.12) return;
      const sx=(cam.x*.5+.5)*w, sy=(-cam.y*.5+.5)*h;
      lx.fillText(s.userData.naam, sx+sc.fsStad*0.7, sy-2);
    });
  }

  // ── PIN LABELS ─────────────────────────────────────────────
  if(!sc.zichtbaar || sc.alpha<=0) return;

  const items=[];
  pins.forEach(mesh=>{
    if(!actCats.has(mesh.userData.loc.cat)||!mesh.visible) return;
    const wp=new THREE.Vector3(); mesh.getWorldPosition(wp);
    const cam=wp.clone().project(camera);
    if(cam.z>1.0) return;
    if(wp.clone().normalize().dot(camera.position.clone().sub(wp).normalize())<0.10) return;
    items.push({mesh, x:(cam.x*.5+.5)*w, y:(-cam.y*.5+.5)*h, z:cam.z});
  });
  items.sort((a,b)=>a.z-b.z); // dichtstbij eerst = hogere prioriteit

  labelHitboxen = []; // module-level: { x1,y1,x2,y2, mesh }
  lx.font=`${sc.fs}px DM Mono,monospace`; // CSS-px na setTransform(dpr)
  const pillH = sc.fs + sc.px * 1.4;
  const pillR = Math.max(2, sc.px * 0.6);

  items.forEach(({mesh,x,y})=>{
    const loc=mesh.userData.loc;
    const kl=KLC[loc.cat];

    // Naam afkappen op basis van zoomniveau
    const delen = loc.naam.split('—')[0].split('(')[0].trim().split(' ');
    const kort = sc.woorden >= 99 ? loc.naam : delen.slice(0, sc.woorden).join(' ');

    // tw in CSS-pixels (measureText geeft na setTransform CSS-pixels terug)
    const tw = lx.measureText(kort).width;
    const lbx = x + sc.offset;
    const lby = y - pillH / 2;
    // Hitbox iets groter dan visuele pill voor makkelijker klikken
    const hitPad = 4;
    const vak = {x1:lbx-sc.px-hitPad, y1:lby-hitPad, x2:lbx+tw+sc.px+hitPad, y2:lby+pillH+hitPad};

    // Anti-overlap: sla over als bezet
    if(labelHitboxen.some(b=>!(vak.x2<b.x1||vak.x1>b.x2||vak.y2<b.y1||vak.y1>b.y2))) return;
    labelHitboxen.push({...vak, mesh});

    const a = sc.alpha;

    // Pill achtergrond — canvas tekent in CSS-pixels dankzij setTransform(dpr)
    // tw is al CSS-pixels, alles klopt
    lx.fillStyle=`rgba(4,6,14,${(a*0.88).toFixed(2)})`;
    lx.beginPath();
    lx.roundRect(lbx-sc.px, lby, tw+sc.px*2, pillH, pillR);
    lx.fill();

    // Pill border
    lx.strokeStyle=kl+sc.borderAlpha;
    lx.lineWidth=sc.lw;
    lx.stroke();

    // Verbindingslijn pin → label
    lx.strokeStyle=`rgba(${hexRgb(kl)},${(a*0.35).toFixed(2)})`;
    lx.lineWidth=sc.lijnLw;
    lx.beginPath();
    lx.moveTo(x+sc.fs*0.3, y);
    lx.lineTo(lbx-sc.px+1, y);
    lx.stroke();

    // Tekst
    lx.fillStyle=`rgba(220,232,252,${a.toFixed(2)})`;
    lx.fillText(kort, lbx, lby+pillH-sc.px*0.7);
  });
}

// Helper: '#4a9eff' → '74,158,255'
function hexRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// INTERACTIE
// ================================================================
let drag=false,px0={x:0,y:0},rotX=0,rotY=0,autoRot=true;
let prevPinch=null,gesPin=null;
let labelHitboxen=[]; // hitboxen van getekende labels

canvas.addEventListener('mousedown',e=>{drag=true;px0={x:e.clientX,y:e.clientY};autoRot=false;updRB();});
canvas.addEventListener('mouseup',()=>drag=false);
canvas.addEventListener('mouseleave',()=>drag=false);
canvas.addEventListener('mousemove',e=>{
  if(drag){rotY+=(e.clientX-px0.x)*.005;rotX+=(e.clientY-px0.y)*.005;
    rotX=Math.max(-1.3,Math.min(1.3,rotX));px0={x:e.clientX,y:e.clientY};}
  chkH(e.clientX,e.clientY);
});
canvas.addEventListener('wheel',e=>{
  doelZ=Math.max(1.2,Math.min(6,doelZ+e.deltaY*.006));updZI(doelZ);
},{passive:true});
canvas.addEventListener('click',e=>tap(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){drag=true;autoRot=false;updRB();px0={x:e.touches[0].clientX,y:e.touches[0].clientY};}
  else if(e.touches.length===2) prevPinch=pd(e);
},{passive:true});
canvas.addEventListener('touchend',e=>{
  drag=false;prevPinch=null;
  if(e.changedTouches.length===1) tap(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&prevPinch!==null){
    const d=pd(e);doelZ=Math.max(1.2,Math.min(6,doelZ+(prevPinch-d)*.009));prevPinch=d;updZI(doelZ);
  } else if(drag&&e.touches.length===1){
    rotY+=(e.touches[0].clientX-px0.x)*.006;rotX+=(e.touches[0].clientY-px0.y)*.006;
    rotX=Math.max(-1.3,Math.min(1.3,rotX));px0={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
},{passive:true});
function pd(e){return Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}

const rc=new THREE.Raycaster();
const mn=new THREE.Vector2();
let hovPin=null;

function ndc(cx,cy){const r=canvas.getBoundingClientRect();mn.set(((cx-r.left)/r.width)*2-1,(-(cy-r.top)/r.height)*2+1);}

function chkH(cx,cy){
  // Check label-hitboxen voor cursor feedback
  const rect2=canvas.getBoundingClientRect();
  const mx2=cx-rect2.left, my2=cy-rect2.top;
  if(labelHitboxen.some(b=>mx2>=b.x1&&mx2<=b.x2&&my2>=b.y1&&my2<=b.y2)){
    canvas.style.cursor='pointer'; return;
  }
  ndc(cx,cy);rc.setFromCamera(mn,camera);
  const hits=rc.intersectObjects([...pins,...ankers]);
  if(hovPin&&hovPin!==gesPin){
    hovPin.material.emissiveIntensity=hovPin.userData.baseEI||.45;
    hovPin.material.opacity=hovPin.userData.baseOpacity||.40;
  }
  // Booganker terugzetten naar standaard onzichtbaar
  ankers.forEach(a=>{ if(a!==gesPin) a.material.opacity=0.18; });
  hovPin=null;canvas.style.cursor='default';
  document.getElementById('btip').classList.remove('on');
  if(!hits.length) return;
  const h=hits[0].object;
  if(h.userData.loc){hovPin=h;h.material.emissiveIntensity=1.0;
      h.material.opacity=0.85;canvas.style.cursor='pointer';}
  else if(h.userData.isBoogAnker){
    h.material.opacity=0.90;
    canvas.style.cursor='pointer';
    const bt=document.getElementById('btip');
    const vb=h.userData.vb;
    bt.innerHTML=`<strong>${h.userData.vL.naam.split('—')[0].trim()}</strong><br>↔ <strong>${h.userData.nL.naam.split('—')[0].trim()}</strong><br><span style="color:#9ab2cc;font-size:.65rem">${vb.label}</span>`;
    const r=canvas.getBoundingClientRect();
    bt.style.left=Math.min(cx+12,r.width-240)+'px';
    bt.style.top=Math.max(cy-70,6)+'px';
    bt.classList.add('on');
  }
}

function tap(cx,cy){
  // Eerst: check of de tap op een getekend label-vak valt (canvas 2D hitbox)
  const rect=canvas.getBoundingClientRect();
  const lx2=cx-rect.left, ly2=cy-rect.top;
  const labelHit=labelHitboxen.find(b=>lx2>=b.x1&&lx2<=b.x2&&ly2>=b.y1&&ly2<=b.y2);
  if(labelHit){
    const m=labelHit.mesh;
    if(gesPin&&gesPin!==m){gesPin.material.opacity=gesPin.userData.baseOpacity||.40;}
    gesPin=m; m.material.opacity=1.0;
    openK(m.userData.loc);
    document.getElementById('hint').classList.add('hide');
    return;
  }
  // Dan: raycaster voor 3D dots en boogankers
  ndc(cx,cy);rc.setFromCamera(mn,camera);
  const hits=rc.intersectObjects([...pins,...ankers]);
  if(!hits.length){sluit();return;}
  const h=hits[0].object;
  if(h.userData.loc){
    if(gesPin&&gesPin!==h){gesPin.material.opacity=gesPin.userData.baseOpacity||.40;}
    gesPin=h;h.material.opacity=1.0;openK(h.userData.loc);
  }
  else if(h.userData.isBoogAnker) openB(h.userData.vb,h.userData.vL,h.userData.nL);
  document.getElementById('hint').classList.add('hide');
}

  document.getElementById('kstad').textContent='📍 '+loc.stad;
  toonURL(loc);
  document.getElementById('kbeschr').textContent=loc.beschr;
  document.getElementById('ktags').innerHTML=loc.tags.map(t=>`<span class="ktag" style="color:${k};border-color:${k}40">${t}</span>`).join('');
  const alleVBN=[...VBN,...eigenVBN];
  const vh=alleVBN.filter(v=>v.van===loc.id||v.naar===loc.id);
  const allLoc=alleLocaties();
  document.getElementById('kvbs').innerHTML=vh.map(v=>{
    const o=allLoc.find(l=>l.id===(v.van===loc.id?v.naar:v.van));
    return `<div class="kvb"><div class="kvb-met">↔ ${o?.naam||'?'}</div><div class="kvb-w">${v.label}</div></div>`;
  }).join('');
  // Edit/delete knoppen tonen voor eigen pins
  const isEigen=!!loc.isEigen;
  document.getElementById('kEditBtn').style.display=isEigen?'flex':'none';
  document.getElementById('kDelBtn').style.display=isEigen?'flex':'none';

  document.getElementById('kaart').classList.add('open');
}
function openB(vb,vL,nL){
  document.getElementById('kband').style.background='#f0c060';
  document.getElementById('kcat').style.color='#f0c060';
  document.getElementById('kcat').textContent='SAMENWERKING';
  document.getElementById('knaam').textContent=vL.naam.split('—')[0].trim()+' ↔ '+nL.naam.split('—')[0].trim();
  document.getElementById('kstad').textContent='📍 '+vL.stad+' — '+nL.stad;
  document.getElementById('kbeschr').textContent=vb.label;
  document.getElementById('kurl').innerHTML='';document.getElementById('kurl').style.display='none';
  document.getElementById('ktags').innerHTML='';
  document.getElementById('kvbs').innerHTML='';
  document.getElementById('kaart').classList.add('open');
}
function sluit(){
  if(gesPin){gesPin.material.emissiveIntensity=gesPin.userData.baseEI||.55;
    gesPin.material.opacity=gesPin.userData.baseOpacity||.72;}
  document.getElementById('kaart').classList.remove('open');
  document.getElementById('editOverlay').classList.remove('open');
  gesPin=null;huidigeLoc=null;
}

function togF(cat){
  if(actCats.has(cat))actCats.delete(cat);else actCats.add(cat);
  document.querySelectorAll('.fb').forEach(el=>{
    el.classList.toggle('off',!actCats.has(el.dataset.cat));
    el.classList.toggle('on',actCats.has(el.dataset.cat));
  });
  pins.forEach(m=>{if(m.userData.loc)m.visible=actCats.has(m.userData.loc.cat);});
  herteken();
}
function togRot(){autoRot=!autoRot;updRB();}
function updRB(){document.getElementById('brot').classList.toggle('on',autoRot);}
function resetV(){doelZ=CZ[1];rotX=0;rotY=0;autoRot=true;updRB();setTrap(1);sluit();}

// ================================================================
// RESIZE
// ================================================================
function resize(){
  const w=wrap.clientWidth,h=wrap.clientHeight;
  renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();herteken();
}
window.addEventListener('resize',resize);resize();

// ================================================================
// LOOP
// ================================================================
let tt=0;
function anim(){
  requestAnimationFrame(anim);
  tt+=.016;
  if(autoRot) rotY+=.003;
  wrapper.rotation.x=rotX; wrapper.rotation.y=rotY;
  camera.position.z+=(doelZ-camera.position.z)*.08;

  // Label overlay elke frame hertekenen zodat 2D en 3D altijd synchroon lopen
  updZI(camera.position.z);
  herteken();

  const ps = pinSchaal();
  pinGrp.children.forEach(obj=>{
    if(obj.userData.isRing){
      obj.userData.t+=.038;
      obj.material.opacity=.06+.08*Math.sin(obj.userData.t);
      // Ring schaalt iets groter dan kern, maar volgt dezelfde camera-Z curve
      obj.scale.setScalar((1+.12*Math.sin(obj.userData.t*.7))*ps);
    } else if(obj.userData.loc){
      obj.scale.setScalar(ps);
    }
  });
  boogGrp.children.forEach(b=>{if(b.userData.isBoog)b.material.opacity=.12+.08*Math.sin(tt*.65);});
  renderer.render(scene,camera);
}

// Laadscherm wegklikken na initialisatie
setTimeout(()=>{
  document.getElementById('loader').style.opacity='0';
  document.getElementById('loader').style.transition='opacity .4s';
  setTimeout(()=>document.getElementById('loader').remove(),500);
},400);

anim(); updRB();

// Initial state
urlMode=false;
eigenMode=false;
document.getElementById('burl').classList.toggle('on',urlMode);
document.getElementById('beigen').classList.toggle('on',eigenMode);

</script>
